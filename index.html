<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>

<script>
function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234"){
window.location.href="dashboard.html";
}
else{
alert("Wrong login");
}

}
</script>

</head>

<body>

<h1>Minecraft Hosting Login</h1>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</body>
</html>
