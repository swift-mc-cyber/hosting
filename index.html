<!DOCTYPE html>
<html>
<head>
<title>Minecraft Hosting Panel</title>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.panel{
background:#1e293b;
padding:20px;
margin:40px;
border-radius:10px;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Minecraft Hosting Panel</h1>

<div class="panel">
<h2>Create Server</h2>
<p>RAM: 2GB</p>
<button>Create</button>
</div>

<div class="panel">
<h2>Manage Server</h2>
<button>Start</button>
<button>Stop</button>
</div>

</body>
</html>
