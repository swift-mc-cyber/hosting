<!DOCTYPE html>
<html>
<head>
<title>Minecraft Hosting Panel</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.header{
background:#020617;
padding:20px;
}

.container{
margin-top:40px;
}

.card{
background:#1e293b;
margin:20px auto;
padding:20px;
width:300px;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
border-radius:5px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div class="header">
<h1>My Minecraft Hosting</h1>
<p>Free Minecraft Server Panel</p>
</div>

<div class="container">

<div class="card">
<h2>Create Server</h2>
<p>2GB RAM Server</p>
<button>Create Server</button>
</div>

<div class="card">
<h2>Manage Server</h2>
<button>Start</button>
<button>Stop</button>
<button>Restart</button>
</div>

</div>

</body>
</html>
